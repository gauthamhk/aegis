faithfulness:
  similarity_threshold: 0.75
  max_claims_per_response: 20
  llm_judge_provider: gemini

semantic_entropy:
  sample_count: 5
  temperature: 0.7
  cluster_distance_threshold: 0.3
  low_entropy: 0.5
  medium_entropy: 1.5
  trigger_faithfulness_range: [0.4, 0.7]

citation_auditor:
  url_timeout_seconds: 5
  content_similarity_threshold: 0.6
  max_urls_per_response: 10

decision_engine:
  weights:
    faithfulness: 0.5
    entropy: 0.3
    citation: 0.2
  default_domain: general

analytics:
  rolling_window_size: 1000
  drift_check_interval: 100
  log_retention_days: 30

performance:
  max_concurrent_verifications: 50
  fast_path_timeout_ms: 500
  full_path_timeout_ms: 3000
